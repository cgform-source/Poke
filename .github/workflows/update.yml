name: Update prices

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet requests beautifulsoup4

      - name: Run price updater
        run: python update_prices.py

      - name: Commit changes (si prix modifiés)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --cached --quiet; then
            echo "Aucun changement, rien à commiter."
          else
            git commit -m "chore: update prices $(date -u +%Y-%m-%d)"
            git push
          fi
